{{ define "main" }}

<article>
  <div class="post-single-head">{{ .Title }}</div>
  <div class="post-single-date">{{ .Date.Format "January 2, 2006 3:04 PM" }}{{ with .Params.edited }} · edited {{ time.AsTime . | time.Format "January 2, 2006 3:04 PM" }}{{ end }}</div>
  <div class="post-body">
    {{ .Content }}
  </div>
  <div class="post-back"><a href="/">back</a></div>
</article>

{{ end }}
